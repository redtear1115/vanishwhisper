<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0D0A14" />
    <!-- Favicon + Apple home screen icon. The same 180×180 PNG covers both —
         browser favicon scales down (it only ever renders at 16-32px), and
         apple-touch-icon is exactly the size iOS wants. If we ever want a
         crisper desktop favicon, drop a 512×512 in here. -->
    <link rel="icon" type="image/png" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>VanishWhisper</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
